ai:
  # Active provider (must match a key under `providers`). User-switchable at
  # runtime via the UI; falls back here when unset.
  provider: "minimax"

  # Optional legacy flat fields (kept so very old test paths keep working).
  base_url: "https://api.minimaxi.com/v1"
  model: "MiniMax-M3"
  temperature: 0.6
  timeout_seconds: 30

  # Multi-provider registry. All three speak the OpenAI Chat Completions
  # protocol, so the same httpx call works for every one of them.
  #
  # Fields per provider:
  #   name        - display label for the UI
  #   base_url    - OpenAI-compatible /chat/completions endpoint
  #   model       - default model for the dropdown
  #   api_key_env - env var the API key lives in
  #   supports_thinking - whether the model has a "thinking" mode we can toggle
  #   thinking_disabled_body_patch - dict merged into the request body when
  #                  thinking is OFF (provider-specific). For DeepSeek this
  #                  is {"thinking": {"type": "disabled"}} per the official
  #                  docs; for Kimi it is omitted because Kimi exposes
  #                  thinking at the model level (kimi-k2.6 etc.).
  #   temperature / timeout_seconds - applied per provider.
  providers:
    minimax:
      name: "MiniMax M3 (默认)"
      base_url: "https://api.minimaxi.com/v1"
      model: "MiniMax-M3"
      api_key_env: "MINIMAX_API_KEY"
      supports_thinking: false
      temperature: 0.6
      timeout_seconds: 30
    deepseek:
      name: "DeepSeek (deepseek-v4-flash)"
      base_url: "https://api.deepseek.com"
      model: "deepseek-v4-flash"
      api_key_env: "DEEPSEEK_API_KEY"
      supports_thinking: true
      thinking_disabled_body_patch:
        thinking:
          type: "disabled"
      temperature: 0.6
      timeout_seconds: 60
    kimi:
      name: "Kimi K3 (Kimi For Coding)"
      base_url: "https://api.kimi.com/coding/v1"
      model: "k3"
      api_key_env: "KIMI_API_KEY"
      supports_thinking: true
      thinking_disabled_body_patch: {}    # Kimi 关闭 thinking 会被路由到 K2.6, 保持开启; 无需 patch
      temperature: 0.6
      timeout_seconds: 60
    glm:
      name: "智谱 GLM-5.2 (Coding Plan)"
      base_url: "https://open.bigmodel.cn/api/coding/paas/v4"
      model: "glm-5.2"
      api_key_env: "GLM_API_KEY"
      supports_thinking: true
      thinking_disabled_body_patch: {}    # GLM reasoning 走独立字段, 不影响 content; 无需 patch
      temperature: 0.6
      timeout_seconds: 60

db_path: "data/wfreport.db"
output_dir: "output"
template_path: "resource/2026年第二十七周周报-王凡.pptx"